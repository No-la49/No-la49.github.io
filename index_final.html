body { font-family: 'Arial', sans-serif; background: linear-gradient(135deg, #FFF0F8 0%, #F0F4FF 50%, #F8F0FF 100%); min-height: 100vh; }
.container { max-width: 1400px; margin: 0 auto; padding: 30px 20px; }
.header { text-align: center; margin-bottom: 50px; }

.card { background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 8px 25px rgba(200, 150, 200, 0.1); transition: all 0.3s ease; cursor: pointer; border: 1px solid rgba(255, 200, 230, 0.3); }
.card:hover { transform: translateY(-8px); box-shadow: 0 12px 30px rgba(200, 150, 200, 0.2); }
.card-image-container { width: 100%; height: 260px; background: #fff; display: flex; align-items: center; justify-content: center; overflow: hidden; }
.card-image { width: 100%; height: 100%; object-fit: contain; display: block; }
.card-content { padding: 15px; text-align: center; }
.card-number { color: #D4B8D0; font-size: 12px; font-weight: bold; margin-bottom: 5px; }
.card-title { font-size: 18px; color: #8B7BA8; font-weight: bold; margin-bottom: 5px; }
.card-feature { color: #C794B8; font-size: 13px; font-weight: 600; }
.modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); overflow-y: auto; }
.modal-content { background: #fff; margin: 5% auto; padding: 20px; border-radius: 20px; width: 90%; max-width: 600px; position: relative; text-align: center; }
.modal-image { width: 100%; border-radius: 15px; margin-bottom: 15px; max-height: 70vh; object-fit: contain; }
.close { position: absolute; top: 15px; right: 20px; font-size: 28px; cursor: pointer; color: #aaa; }
@media (max-width: 768px) { .header h1 { font-size: 32px; } .gallery { grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; } .card-image-container { height: 200px; } }

const gallery = document.getElementById('gallery');
bearData.forEach((bear, index) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.onclick = () => openModal(index);
    card.innerHTML = `
        <div class="card-image-container">
            <img class="card-image" src="${bear.id}" alt="${bear.name}">
        </div>
        <div class="card-content">
            <div class="card-number">#${bear.n}</div>
            <div class="card-title">${bear.name}</div>
            <div class="card-feature">${bear.color} / ${bear.feature}</div>
        </div>
    `;
    gallery.appendChild(card);
});

function openModal(index) {
    const bear = bearData[index];
    document.getElementById("modalImage").src = bear.id;
    document.getElementById("modalNumber").textContent = `#${bear.n}`;
    document.getElementById("modalTitle").textContent = bear.name;
    document.getElementById("modalFeature").textContent = bear.color + " / " + bear.feature;
    document.getElementById("modalDesc").textContent = bear.desc;
    document.getElementById("modal").style.display = "block";
}
function closeModal() { document.getElementById("modal").style.display = "none"; }
window.onclick = (e) => { if(e.target == document.getElementById("modal")) closeModal(); }
