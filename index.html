<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Care Bears Collection</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#ffe6f0,#e6f0ff);
  transition:0.3s;
}

h1{
  text-align:center;
  padding:20px;
  font-size:28px;
}

/* 工具列 */
.topbar{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
  padding:10px;
}

input, select, button{
  padding:10px;
  border-radius:12px;
  border:none;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

/* 卡片 */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:15px;
  padding:15px;
}

.card{
  background:white;
  border-radius:18px;
  overflow:hidden;
  cursor:pointer;
  box-shadow:0 6px 18px rgba(0,0,0,0.12);
  transition:0.25s;
  position:relative;
}

.card:hover{
  transform:translateY(-6px);
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
}

.card h3{
  font-size:14px;
  margin:8px;
}

.heart{
  position:absolute;
  top:8px;
  right:10px;
  cursor:pointer;
}

/* modal */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-box{
  background:white;
  padding:20px;
  border-radius:16px;
  width:260px;
}

/* dark */
.dark{
  background:#111;
  color:white;
}

.dark .card{
  background:#1e1e1e;
  color:white;
}
</style>
</head>

<div class="topbar">
  <input id="search" placeholder="搜尋熊熊">
  
  <select id="category">
    <option value="all">全部</option>
    <option value="normal">一般</option>
    <option value="halloween">萬聖節</option>
    <option value="christmas">聖誕節</option>
    <option value="valentine">情人節</option>
    <option value="fav">❤️ 收藏</option>
  </select>

  <select id="sort">
    <option value="id">排序</option>
    <option value="name">名稱</option>
  </select>

  <button onclick="toggleDark()">🌙</button>
  <div>❤️ <span id="favCount">0</span></div>
</div>

<div class="grid" id="grid"></div>

<!-- modal -->
<div class="modal" id="modal">

/* 收藏 */
let fav = JSON.parse(localStorage.getItem("fav")||"[]");

function render(list){
  const grid = document.getElementById("grid");
  grid.innerHTML="";

  list.forEach(b=>{
    const div=document.createElement("div");
    div.className="card";

    const isFav = fav.includes(b.id);

    div.innerHTML=`
      <div class="heart" onclick="toggleFav(event,${b.id})">
        ${isFav?"❤️":"🤍"}
      </div>
      <img src="https://via.placeholder.com/300">
      <h3>${b.name}</h3>
    `;

    div.onclick=()=>openModal(b);
    grid.appendChild(div);
  });

  document.getElementById("favCount").innerText=fav.length;
}

function toggleFav(e,id){
  e.stopPropagation();
  fav = fav.includes(id)
    ? fav.filter(x=>x!==id)
    : [...fav,id];

  localStorage.setItem("fav",JSON.stringify(fav));
  apply();
}

function openModal(b){
  document.getElementById("modal").style.display="flex";
  document.getElementById("mname").innerText=b.name;
  document.getElementById("mdesc").innerText=b.desc;
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

function toggleDark(){
  document.body.classList.toggle("dark");
}

function apply(){
  let list=[...data];

  const cat=document.getElementById("category").value;
  const search=document.getElementById("search").value.toLowerCase();
  const sort=document.getElementById("sort").value;

  if(cat==="fav"){
    list=list.filter(x=>fav.includes(x.id));
  }else if(cat!=="all"){
    list=list.filter(x=>x.tag===cat);
  }

  if(search){
    list=list.filter(x=>x.name.toLowerCase().includes(search));
  }

  if(sort==="name"){
    list.sort((a,b)=>a.name.localeCompare(b.name));
  }

  render(list);
}

document.getElementById("search").oninput=apply;
document.getElementById("category").onchange=apply;
document.getElementById("sort").onchange=apply;

apply();
