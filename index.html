* {

body {
    font-family: "Arial", sans-serif;

}

.container {

.header {

}

.header h1 {

    background-clip: text;
    margin-bottom: 10px;
    font-weight: bold;
    text-shadow: none;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 25px;

}

.card {
    background: linear-gradient(135deg, #FFFAF0 0%, #F5F0FF 100%);
    border-radius: 25px;
    overflow: hidden;
    box-shadow: 0 8px 25px rgba(200, 150, 200, 0.15);
    transition: all 0.3s ease;
    cursor: pointer;
    animation: fadeInUp 0.5s ease-out;

}

.card:hover {

}

.card-image {

}

.card:hover .card-image {

}

.card-content {

}

.card-number {

.card-desc {

    margin-bottom: 12px;
}

.card-info {

    font-size: 11px;
}

/* 彈窗樣式 */
.modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(150, 120, 150, 0.6);
    animation: fadeIn 0.3s ease;
    overflow-y: auto;
}

.modal-content {
    background: linear-gradient(135deg, #FFFAF0 0%, #F5F0FF 100%);

.close {

    font-size: 28px;
    font-weight: bold;
    cursor: pointer;
    transition: color 0.3s;
}

.close:hover {
    color: #C794B8;
}

@keyframes slideDown {
    from {
        opacity: 0;
        transform: translateY(-20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes fadeInUp {

    }
    to {

    }
}

@media (max-width: 768px) {

// 生成卡片
const gallery = document.getElementById('gallery');
bearData.forEach((bear, index) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.onclick = () => openModal(index);
    
    card.innerHTML = `
        <div class="card-image">🧸</div>
        <div class="card-content">
            <div class="card-number">#${bear.number}</div>
            <div class="card-title">${bear.name}</div>
            <div class="card-feature">${bear.feature}</div>
            <div class="card-desc">${bear.desc}</div>
            <div class="card-info">👁️ Click to view</div>
        </div>
    `;
    
    gallery.appendChild(card);
});

function openModal(index) {
    const modal = document.getElementById("modal");
    const bear = bearData[index];
    document.getElementById("modalNumber").textContent = `#${bear.number}`;
    document.getElementById("modalTitle").textContent = bear.name;
    document.getElementById("modalFeature").textContent = bear.feature;
    document.getElementById("modalDesc").textContent = bear.desc;
    modal.style.display = "block";
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}

// 點擊外部關閉彈窗
window.onclick = function(event) {
    const modal = document.getElementById("modal");
    if (event.target == modal) {
        modal.style.display = "none";
    }
}
