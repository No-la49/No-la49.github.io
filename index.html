<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>娃娃收藏展示</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: "Arial", sans-serif;
    background: linear-gradient(135deg, #ffeef8 0%, #fff5e6 100%);
    padding: 40px 20px;
    min-height: 100vh;
}

.container {
    max-width: 1200px;
    margin: 0 auto;
}

.header {
    text-align: center;
    margin-bottom: 50px;
    animation: slideDown 0.6s ease-out;
}

.header h1 {
    font-size: 48px;
    color: #ff6b9d;
    margin-bottom: 10px;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
}

.header p {
    color: #888;
    font-size: 16px;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 30px;
    margin-bottom: 40px;
}

.card {
    background: white;
    border-radius: 25px;
    overflow: hidden;
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    transition: all 0.3s ease;
    cursor: pointer;
    animation: fadeInUp 0.5s ease-out;
}

.card:hover {
    transform: translateY(-15px);
    box-shadow: 0 15px 40px rgba(255, 107, 157, 0.3);
}

.card-image {
    width: 100%;
    height: 280px;
    object-fit: cover;
    display: block;
    transition: transform 0.3s ease;
}

.card:hover .card-image {
    transform: scale(1.05);
}

.card-content {
    padding: 20px;
}

.card-tag {
    display: inline-block;
    background: linear-gradient(135deg, #ff6b9d, #ff8fab);
    color: white;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: bold;
    margin-bottom: 12px;
}

.card-title {
    font-size: 22px;
    color: #333;
    margin-bottom: 10px;
    font-weight: bold;
}

.card-desc {
    color: #666;
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 15px;
}

.card-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: #999;
    font-size: 12px;
}

/* 彈窗樣式 */
.modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.7);
    animation: fadeIn 0.3s ease;
}

.modal-content {
    background: white;
    margin: auto;
    padding: 20px;
    border-radius: 20px;
    width: 90%;
    max-width: 800px;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    animation: slideUp 0.4s ease;
}

.modal-image {
    width: 100%;
    border-radius: 15px;
    margin-bottom: 20px;
}

.modal-title {
    font-size: 28px;
    color: #ff6b9d;
    margin-bottom: 15px;
    font-weight: bold;
}

.modal-desc {
    color: #666;
    font-size: 16px;
    line-height: 1.8;
    margin-bottom: 20px;
}

.close {
    color: #aaa;
    float: right;
    font-size: 28px;
    font-weight: bold;
    cursor: pointer;
    transition: color 0.3s;
}

.close:hover {
    color: #ff6b9d;
}

@keyframes slideDown {
    from {
        opacity: 0;
        transform: translateY(-20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes fadeIn {
    from {
        opacity: 0;
    }
    to {
        opacity: 1;
    }
}

@keyframes slideUp {
    from {
        opacity: 0;
        transform: translate(-50%, -40%);
    }
    to {
        opacity: 1;
        transform: translate(-50%, -50%);
    }
}

/* 響應式設計 */
@media (max-width: 768px) {
    .header h1 {
        font-size: 36px;
    }
    
    .gallery {
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 20px;
    }
    
    .modal-content {
        width: 95%;
        padding: 15px;
    }
}
</style>
</head>

<body>

<div class="container">
    <div class="header">
        <h1>🎀 我的娃娃收藏</h1>
        <p>點擊圖片查看詳細信息</p>
    </div>

    <div class="gallery">
        <!-- 卡片 1 -->
        <div class="card" onclick="openModal(0)">
            <img src="https://images.unsplash.com/photo-1527529482837-4698179dc6ce?q=80&w=1200" alt="吉伊卡哇" class="card-image">
            <div class="card-content">
                <div class="card-tag">Chiikawa</div>
                <div class="card-title">吉伊卡哇</div>
                <div class="card-desc">超可愛的小夥伴，粉紅配色最療癒</div>
                <div class="card-info">
                    <span>👁️ 點擊查看</span>
                </div>
            </div>
        </div>

        <!-- 卡片 2 -->
        <div class="card" onclick="openModal(1)">
            <img src="https://images.unsplash.com/photo-1595777712802-36a59eef63c0?q=80&w=1200" alt="Care Bears" class="card-image">
            <div class="card-content">
                <div class="card-tag">Care Bears</div>
                <div class="card-title">愛心熊</div>
                <div class="card-desc">經典收藏款，充滿愛與溫暖的象徵</div>
                <div class="card-info">
                    <span>👁️ 點擊查看</span>
                </div>
            </div>
        </div>

        <!-- 卡片 3 -->
        <div class="card" onclick="openModal(2)">
            <img src="https://images.unsplash.com/photo-1591553895911-0055eca6402d?q=80&w=1200" alt="Squishmallows" class="card-image">
            <div class="card-content">
                <div class="card-tag">Squishmallows</div>
                <div class="card-title">柔軟娃娃</div>
                <div class="card-desc">超柔軟舒適，適合擁抱與收藏</div>
                <div class="card-info">
                    <span>👁️ 點擊查看</span>
                </div>
            </div>
        </div>

        <!-- 卡片 4 -->
        <div class="card" onclick="openModal(3)">
            <img src="https://images.unsplash.com/photo-1532453290872-5fc82f3602b4?q=80&w=1200" alt="限定款" class="card-image">
            <div class="card-content">
                <div class="card-tag">限定款</div>
                <div class="card-title">隱藏版娃娃</div>
                <div class="card-desc">特殊活動限定，數量稀少的珍藏</div>
                <div class="card-info">
                    <span>👁️ 點擊查看</span>
                </div>
            </div>
        </div>

        <!-- 卡片 5 -->
        <div class="card" onclick="openModal(4)">
            <img src="https://images.unsplash.com/photo-1585647347384-20277cb1529f?q=80&w=1200" alt="粉色夢幻" class="card-image">
            <div class="card-content">
                <div class="card-tag">新手必備</div>
                <div class="card-title">粉色夢幻</div>
                <div class="card-desc">甜蜜的粉紅色系列，適合房間佈置</div>
                <div class="card-info">
                    <span>👁️ 點擊查看</span>
                </div>
            </div>
        </div>

        <!-- 卡片 6 -->
        <div class="card" onclick="openModal(5)">
            <img src="https://images.unsplash.com/photo-1544716278-ca5e3af4abd8?q=80&w=1200" alt="經典系列" class="card-image">
            <div class="card-content">
                <div class="card-tag">經典系列</div>
                <div class="card-title">永恆經典</div>
                <div class="card-desc">歷久不衰的經典款，代代相傳的寶藏</div>
                <div class="card-info">
                    <span>👁️ 點擊查看</span>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 彈窗 -->
<div id="modal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <img id="modalImage" src="" alt="" class="modal-image">
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-desc" id="modalDesc"></div>
    </div>
</div>

<script>
const dollData = [
    {
        title: "吉伊卡哇",
        desc: "超可愛的小夥伴！吉伊卡哇以其獨特的萌態和療癒外觀深受喜愛。粉紅色的配色搭配圓圓的身體，簡直是娃娃收藏必備款。每一隻都充滿個性，是房間裝飾的完美選擇。",
        image: "https://images.unsplash.com/photo-1527529482837-4698179dc6ce?q=80&w=1200"
    },
    {
        title: "愛心熊 Care Bears",
        desc: "經典收藏款的愛心熊系列！充滿了愛與溫暖的象徵。每隻熊都有獨特的標誌和顏色，代表不同的情感和祝福。無論你是資深收藏家還是新手，愛心熊都是不可或缺的一部分。",
        image: "https://images.unsplash.com/photo-1595777712802-36a59eef63c0?q=80&w=1200"
    },
    {
        title: "柔軟娃娃 Squishmallows",
        desc: "超級柔軟舒適的Squishmallows系列！無論大小，每一隻都是擁抱的最佳選擇。蓬鬆的手感和可愛的表情，讓它們成為完美的收藏品和陪伴者。很多人都把它們當作最好的朋友！",
        image: "https://images.unsplash.com/photo-1591553895911-0055eca6402d?q=80&w=1200"
    },
    {
        title: "隱藏版娃娃",
        desc: "特殊活動限定款！這些隱藏版娃娃數量稀少，是每個收藏家都夢想擁有的珍寶。它們通常只在特定活動或時間段發售，所以一旦錯過就難以再得到。這是真正的收藏價值所在！",
        image: "https://images.unsplash.com/photo-1532453290872-5fc82f3602b4?q=80&w=1200"
    },
    {
        title: "粉色夢幻系列",
        desc: "甜蜜的粉紅色系列娃娃！適合房間佈置，營造溫暖舒適的氛圍。這個系列的每一隻都充滿少女心，是喜歡粉色的收藏家必備的選擇。擺在書架或床邊都能增添可愛度。",
        image: "https://images.unsplash.com/photo-1585647347384-20277cb1529f?q=80&w=1200"
    },
    {
        title: "永恆經典款",
        desc: "歷久不衰的經典款娃娃！這些經典款見證了娃娃文化的發展，是代代相傳的寶藏。無論時代如何變化，它們永遠都能打動人心，是所有收藏家心中的永恆經典。",
        image: "https://images.unsplash.com/photo-1544716278-ca5e3af4abd8?q=80&w=1200"
    }
];

function openModal(index) {
    const modal = document.getElementById("modal");
    const data = dollData[index];
    document.getElementById("modalImage").src = data.image;
    document.getElementById("modalTitle").textContent = data.title;
    document.getElementById("modalDesc").textContent = data.desc;
    modal.style.display = "block";
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}

// 點擊外部關閉彈窗
window.onclick = function(event) {
    const modal = document.getElementById("modal");
    if (event.target == modal) {
        modal.style.display = "none";
    }
}
</script>

</body>
</html>
